<style>
:root {
  --bg: #050810;
  --bg2: #080c18;
  --bg3: #0d1220;
  --green: #00ff88;
  --green-dim: #00cc6a;
  --green-glow: rgba(0,255,136,0.15);
  --purple: #7b2fff;
  --purple-dim: #5a22c4;
  --purple-glow: rgba(123,47,255,0.12);
  --amber: #ff6b35;
  --amber-glow: rgba(255,107,53,0.12);
  --red: #ff2d55;
  --text: #c8d4e8;
  --text-mid: #7a8fa8;
  --text-dim: #3a4a5a;
  --border: #111e30;
  --border-bright: #1e3050;
  --mono: 'IBM Plex Mono', monospace;
  --syl: 'Noto Sans Canadian Aboriginal', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; overflow-x: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
  line-height: 1.6;
  cursor: crosshair;
  overflow-x: hidden;
}

/* ── CUSTOM CURSOR ── */
.cursor-dot {
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  position: fixed; top: 0; left: 0;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%,-50%);
  transition: transform 0.1s;
  mix-blend-mode: screen;
}
.cursor-ring {
  width: 28px; height: 28px;
  border: 1px solid rgba(0,255,136,0.4);
  border-radius: 50%;
  position: fixed; top: 0; left: 0;
  pointer-events: none; z-index: 9998;
  transform: translate(-50%,-50%);
  transition: all 0.12s ease;
}

/* ── CLASSIFICATION BAR ── */
.classbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: rgba(5,8,16,0.95);
  border-bottom: 1px solid var(--amber);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  height: 32px;
  backdrop-filter: blur(12px);
}
.classbar-left {
  font-size: 10px; font-weight: 600; letter-spacing: 0.15em;
  color: var(--amber);
  text-shadow: 0 0 12px rgba(255,107,53,0.6);
}
.classbar-right {
  font-size: 10px; color: var(--text-mid); letter-spacing: 0.08em;
}
.classbar-case {
  font-size: 10px; color: var(--text-mid); letter-spacing: 0.1em;
}

/* ── STATUS TICKER ── */
.ticker {
  position: fixed; top: 32px; left: 0; right: 0; z-index: 999;
  background: rgba(5,8,16,0.9);
  border-bottom: 1px solid var(--border-bright);
  height: 24px; overflow: hidden;
  backdrop-filter: blur(8px);
}
.ticker-inner {
  display: flex; align-items: center; height: 100%;
  white-space: nowrap;
  animation: ticker-scroll 60s linear infinite;
}
.ticker-inner span {
  font-size: 10px; color: var(--green); letter-spacing: 0.1em;
  padding: 0 40px;
}
.ticker-inner .sep { color: var(--text-dim); padding: 0 8px; }
@keyframes ticker-scroll {
  from { transform: translateX(100vw); }
  to { transform: translateX(-100%); }
}

/* ── SCANLINE OVERLAY ── */
body::after {
  content: '';
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none; z-index: 5000;
}

/* ── HERO ── */
#hero {

  height: 100vh; min-height: 600px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding-top: 56px;

}

#constellation {
  position: absolute; top: 0; left: 0;

}

.hero-noise {

  opacity: 0.4; z-index: 1; pointer-events: none;

}

.hero-case {

  opacity: 0;
}

.hero-title {
  font-size: clamp(56px, 10vw, 120px);
  font-weight: 700; letter-spacing: -0.02em;
  color: #fff;
  line-height: 1;
  position: relative;
  animation: fadeUp 0.8s ease forwards 0.7s;
  opacity: 0;
}
.hero-title.glitch {
  animation: fadeUp 0.8s ease forwards 0.7s, glitch 4s infinite 2s;
}
.hero-title::before,
.hero-title::after {
  content: attr(data-text);
  position: absolute; top: 0; left: 0; right: 0;
  opacity: 0;
}
.hero-title::before {
  color: var(--red);
  animation: glitch-before 4s infinite 2s;
}
.hero-title::after {
  color: var(--green);
  animation: glitch-after 4s infinite 2s;
}

@keyframes glitch {
  0%, 85%, 100% { transform: none; }
  86% { transform: skewX(-1deg); }
  87% { transform: skewX(1.5deg); }
  88% { transform: none; }
  93% { transform: skewX(-0.5deg); }
}
@keyframes glitch-before {
  0%, 84%, 100% { opacity: 0; }
  85% { opacity: 0.7; transform: translate(-3px, 1px); clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%); }
  86% { opacity: 0.7; transform: translate(3px, -1px); clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%); }
  87% { opacity: 0; }
  92% { opacity: 0; }
  93% { opacity: 0.5; transform: translate(-2px, 2px); clip-path: polygon(0 45%, 100% 45%, 100% 55%, 0 55%); }
  94% { opacity: 0; }
}
@keyframes glitch-after {
  0%, 84%, 100% { opacity: 0; }
  85% { opacity: 0.5; transform: translate(3px, -1px); clip-path: polygon(0 55%, 100% 55%, 100% 70%, 0 70%); }
  86% { opacity: 0; }
  91% { opacity: 0; }
  92% { opacity: 0.6; transform: translate(-3px, 2px); clip-path: polygon(0 10%, 100% 10%, 100% 25%, 0 25%); }
  93% { opacity: 0; }
}

.hero-sub {
  font-size: 12px; font-weight: 400; letter-spacing: 0.3em;
  color: var(--text-mid);
  text-transform: uppercase;
  animation: fadeUp 0.8s ease forwards 0.9s;
  opacity: 0;
}
.hero-sub em { color: var(--green); font-style: normal; }

.fires {
  display: flex; gap: 8px; align-items: center;
  animation: fadeUp 0.8s ease forwards 1.1s;
  opacity: 0;
}
.fire-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: pulse-fire 2s ease-in-out infinite;
}
.fire-dot:nth-child(1) { animation-delay: 0s; }
.fire-dot:nth-child(2) { animation-delay: 0.2s; }
.fire-dot:nth-child(3) { animation-delay: 0.4s; }
.fire-dot:nth-child(4) { animation-delay: 0.6s; }
.fire-dot:nth-child(5) { animation-delay: 0.8s; }
.fire-dot:nth-child(6) { animation-delay: 1.0s; }
.fire-dot.dark { background: var(--text-dim); box-shadow: none; animation: none; }
@keyframes pulse-fire {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.fires-label {
  font-size: 9px; letter-spacing: 0.2em; color: var(--text-dim);
  text-transform: uppercase; margin-left: 8px;
}

.scroll-indicator {
  position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  z-index: 10;
  animation: fadeUp 0.8s ease forwards 1.5s;
  opacity: 0;
}
.scroll-indicator span { font-size: 9px; letter-spacing: 0.3em; color: var(--text-dim); text-transform: uppercase; }
.scroll-line { width: 1px; height: 40px; background: linear-gradient(to bottom, var(--green), transparent); animation: scan-down 1.5s ease-in-out infinite; }
@keyframes scan-down { 0% { transform: scaleY(0); transform-origin: top; } 50% { transform: scaleY(1); transform-origin: top; } 51% { transform-origin: bottom; } 100% { transform: scaleY(0); transform-origin: bottom; } }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── SECTION BASE ── */
section { position: relative; }

.section-wrapper {
  max-width: 900px;
  margin: 0 auto;

}

.dossier-line {

}
.dossier-line::before {
  content: '';

  background: var(--green);

}
.dossier-tag {

  font-weight: 500;
}

/* ── SUBJECT FILE ── */
#subject {
  background: linear-gradient(to bottom, var(--bg), var(--bg2));
  border-top: 1px solid var(--border);
}

.file-stamp {
  position: absolute; top: 60px; right: 40px;
  font-size: 28px; font-weight: 700; letter-spacing: 0.2em;

}

.file-meta {

.meta-key { font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }

.redact {

  cursor: pointer;
  transition: all 0.3s;
  user-select: none;
}
.redact:hover, .redact.revealed {
  background: transparent;
  color: var(--amber);
}

/* ── ACCESS LEVELS ── */
#access {
  background: var(--bg2);
  border-top: 1px solid var(--border);
}

.access-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));

}

.access-card {

.access-card:hover { background: rgba(0,255,136,0.03); }

.access-level {

.access-card.amber:hover { background: rgba(255,107,53,0.03); }

.signal-line-val {

.signal-line-val:hover { color: var(--green); }
.signal-indicator {

  margin-left: auto;
  animation: pulse-fire 2s ease-in-out infinite;
}

.signal-notice {
  font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em;

}

/* ── FOOTER ── */
footer {
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding: 32px 40px;
}
.footer-inner {
  max-width: 900px; margin: 0 auto;

  flex-wrap: wrap; gap: 16px;
}
.footer-class {

/* ── MOBILE ── */

  .access-grid { grid-template-columns: 1fr; }
  .footer-inner { flex-direction: column; text-align: center; }
}

<script>
function attempt(){
  const s=document.getElementById('status');
  const k=document.getElementById('key').value;
  if(!k){s.className='status denied';s.textContent='⚠ ACCESS KEY REQUIRED';setTimeout(()=>{s.className='status nominal';s.textContent='● STANDING BY'},2000);return;}
  s.className='status denied';
  s.textContent='✗ ACCESS DENIED // CREDENTIALS INVALID';
  document.getElementById('key').value='';
  setTimeout(()=>{s.className='status nominal';s.textContent='● STANDING BY'},3000);
}
document.getElementById('key').addEventListener('keydown',e=>{if(e.key==='Enter')attempt();});
</script>
